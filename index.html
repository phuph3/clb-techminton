<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techminton Badminton Club</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .admin-only { display: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen p-4 pb-12">

    <div class="max-w-xl mx-auto space-y-6">
        <div class="flex justify-end">
            <button onclick="toggleLanguage()" id="langBtn" class="bg-white hover:bg-slate-50 text-slate-700 font-bold py-1.5 px-3 rounded-xl text-xs border border-slate-200 shadow-xs cursor-pointer flex items-center gap-1">
                🇯🇵 日本語
            </button>
        </div>

        <header class="text-center py-4 bg-gradient-to-r from-indigo-600 to-blue-600 text-white rounded-2xl shadow-md relative">
            <h1 id="mainTitle" class="text-xl font-bold uppercase tracking-wide">Lịch Thi Đấu Cầu Lông</h1>
            <p id="roleDisplay" class="text-xs opacity-90 mt-1">Chế độ: Đang tải dữ liệu...</p>
        </header>

        <section class="admin-only bg-amber-50 border border-amber-200 p-4 rounded-2xl shadow-sm space-y-2">
            <h3 id="adminPanelTitle" class="font-bold text-xs text-amber-800 uppercase">Bảng điều khiển Admin</h3>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="loadDataFromCloud()" id="btnLoadCloud" class="bg-white hover:bg-slate-50 text-slate-700 font-medium py-2 rounded-xl text-xs border border-slate-200 cursor-pointer">🔄 Tải data từ Cloud</button>
                <button onclick="saveDataToCloud()" id="btnSaveCloud" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 rounded-xl text-xs cursor-pointer">☁️ Lưu & Phát sóng lịch</button>
            </div>
        </section>

        <section class="bg-white p-4 rounded-2xl shadow-sm grid grid-cols-2 gap-4">
            <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                <div>
                    <h3 id="lblCourts" class="font-bold text-xs text-slate-700 uppercase">Số sân đấu</h3>
                </div>
                <div class="flex items-center gap-1.5 p-1">
                    <button onclick="changeCourts(-1)" class="admin-only w-6 h-6 font-bold text-slate-700 bg-white rounded border border-slate-200 cursor-pointer justify-center items-center text-xs">-</button>
                    <span id="courtCountDisplay" class="w-6 text-center font-bold text-indigo-600 text-sm">1</span>
                    <button onclick="changeCourts(1)" class="admin-only w-6 h-6 font-bold text-slate-700 bg-white rounded border border-slate-200 cursor-pointer justify-center items-center text-xs">+</button>
                </div>
            </div>

            <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                <div>
                    <h3 id="lblRounds" class="font-bold text-xs text-slate-700 uppercase">Tổng số vòng</h3>
                </div>
                <div class="flex items-center gap-1.5 p-1">
                    <button onclick="changeRoundsSetting(-1)" class="admin-only w-6 h-6 font-bold text-slate-700 bg-white rounded border border-slate-200 cursor-pointer justify-center items-center text-xs">-</button>
                    <span id="roundsSettingDisplay" class="w-6 text-center font-bold text-indigo-600 text-sm">5</span>
                    <button onclick="changeRoundsSetting(1)" class="admin-only w-6 h-6 font-bold text-slate-700 bg-white rounded border border-slate-200 cursor-pointer justify-center items-center text-xs">+</button>
                </div>
            </div>
        </section>

        <section class="bg-white p-4 rounded-2xl shadow-sm space-y-3">
            <div class="flex justify-between items-center">
                <h2 id="lblMemberList" class="font-bold text-sm text-slate-500 uppercase tracking-wider">1. Danh sách Thành Viên</h2>
                <div class="admin-only gap-2 flex">
                    <button onclick="openBulkModal()" id="btnBulkAdd" class="text-xs text-indigo-600 font-bold bg-indigo-50 px-2 py-1 rounded-lg border border-indigo-100 cursor-pointer">📝 Thêm hàng loạt</button>
                    <button onclick="resetData()" id="btnReset" class="text-xs text-red-500 font-medium cursor-pointer">Xóa hết</button>
                </div>
            </div>
            <div class="admin-only grid grid-cols-3 gap-2">
                <input id="memberNameInput" type="text" placeholder="Tên thành viên..." class="col-span-2 px-3 py-2 border border-slate-200 rounded-xl text-sm">
                <select id="memberLevelInput" class="px-2 py-2 border border-slate-200 rounded-xl bg-white text-sm font-bold text-slate-700">
                    <option value="A">⚠️ Level A</option>
                    <option value="B" selected>🔹 Level B</option>
                    <option value="C">🔸 Level C</option>
                </select>
            </div>
            <button onclick="addMember()" id="btnAddSingle" class="admin-only w-full bg-indigo-600 text-white font-medium py-2 rounded-xl text-sm cursor-pointer justify-center items-center">+ Thêm Thành Viên</button>
            <div id="memberList" class="flex flex-wrap gap-2 pt-2"></div>
        </section>

        <section class="bg-white p-4 rounded-2xl shadow-sm space-y-4">
            <div class="border-b border-slate-100 pb-2">
                <h2 id="lblScheduleTitle" class="font-bold text-sm text-slate-500 uppercase tracking-wider">2. Lịch Trình Các Vòng Đấu</h2>
            </div>

            <button onclick="generateAllRounds()" id="btnGenerate" class="admin-only w-full bg-gradient-to-r from-indigo-600 to-blue-500 text-white font-bold py-3 rounded-xl shadow-md cursor-pointer justify-center items-center">
                🎲 Tự Động Xếp Vòng Đấu Cân Bằng Level
            </button>

            <div id="scheduleContainer" class="space-y-4"></div>
        </section>
    </div>

    <div id="bulkModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-md p-5 space-y-4 shadow-xl">
            <div>
                <h3 id="lblBulkTitle" class="font-bold text-base text-slate-800">Thêm hàng loạt</h3>
                <p id="lblBulkDesc" class="text-xs text-slate-400 mt-0.5">Nhập định dạng: Tên - A, Tên - B hoặc Tên - C</p>
            </div>
            <textarea id="bulkInput" rows="8" placeholder="Nguyễn Văn A - A&#10;Trần Thị B - B&#10;Lê Văn C - C" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-mono focus:outline-indigo-500"></textarea>
            <div class="flex justify-end gap-2 text-sm font-medium">
                <button onclick="closeBulkModal()" id="btnBulkCancel" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl cursor-pointer">Hủy</button>
                <button onclick="submitBulkMembers()" id="btnBulkConfirm" class="px-4 py-2 bg-indigo-600 text-white rounded-xl cursor-pointer">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
        // ĐIỀN THÔNG TIN KẾT NỐI JSONBIN CỦA BẠN VÀO ĐÂY
        const BIN_ID = "6a23e2ecda38895dfe903b0f"; 
        const MASTER_KEY = "$2a$10$yOZaOHQ26goa2W1RaXmo3OBw7rZy.Td1wg6qA1DYyRx.jRfvkpoWi"; 

        let members = [];
        let totalRoundsSetting = 5;
        let activeCourtsCount = 1;
        let generatedSchedule = [];
        let isAdmin = false;
        let currentLang = 'vi'; // Mặc định tiếng Việt

        // Kho dữ liệu ngôn ngữ dịch thuật
        const i18n = {
            vi: {
                langBtn: "🇯🇵 日本語",
                mainTitle: "Lịch Thi Đấu Cầu Lông",
                roleAdmin: "🔑 Chế độ: Quản trị viên (Admin)",
                roleUser: "📱 Chế độ: Thành viên (Chỉ xem lịch)",
                loadingCloud: "⏳ Đang đồng bộ lên đám mây...",
                saveCloudSuccess: "🔑 Đã phát sóng lịch mới thành công!",
                noConfigCloud: "Vui lòng mở file code điền BIN_ID và MASTER_KEY để kết nối dữ liệu!",
                adminPanelTitle: "Bảng điều khiển Admin",
                btnLoadCloud: "🔄 Tải data từ Cloud",
                btnSaveCloud: "☁️ Lưu & Phát sóng lịch",
                lblCourts: "Số sân đấu",
                lblRounds: "Tổng số vòng",
                lblMemberList: "1. Danh sách Thành Viên",
                btnBulkAdd: "📝 Thêm hàng loạt",
                btnReset: "Xóa hết",
                placeholderName: "Tên thành viên...",
                btnAddSingle: "+ Thêm Thành Viên",
                lblScheduleTitle: "2. Lịch Trình Các Vòng Đấu",
                btnGenerate: "🎲 Tự Động Xếp Vòng Đấu Cân Bằng Level",
                noSchedule: "Chưa có lịch đấu được phát sóng công khai.",
                roundTxt: "VÒNG ĐẤU SỐ",
                courtTxt: "Sân số",
                restTxt: "💤 Nghỉ vòng này:",
                lblBulkTitle: "Thêm hàng loạt",
                lblBulkDesc: "Mỗi thành viên nhập một dòng. Định dạng: Tên - A, Tên - B hoặc Tên - C",
                btnBulkCancel: "Hủy",
                btnBulkConfirm: "Xác nhận",
                alertNotEnough: "Không đủ người sẵn sàng!",
                confirmReset: "Bạn có chắc chắn muốn xóa hết toàn bộ thành viên và lịch đấu không?",
                cloudError: "Lỗi kết nối đám mây!"
            },
            ja: {
                langBtn: "🇻🇳 Tiếng Việt",
                mainTitle: "バドミントン試合スケジュール",
                roleAdmin: "🔑 モード: 管理者 (Admin)",
                roleUser: "📱 モード: メンバー (閲覧のみ)",
                loadingCloud: "⏳ クラウドに同期中...",
                saveCloudSuccess: "🔑 新しいスケジュールを公開しました！",
                noConfigCloud: "データ接続のため、ソースコードにBIN_IDとMASTER_KEYを入力してください！",
                adminPanelTitle: "管理者コントロールパネル",
                btnLoadCloud: "🔄 クラウドから読込",
                btnSaveCloud: "☁️ 保存して公開",
                lblCourts: "コート数",
                lblRounds: "総ラウンド数",
                lblMemberList: "1. メンバーリスト",
                btnBulkAdd: "📝 一括追加",
                btnReset: "全削除",
                placeholderName: "メンバー名...",
                btnAddSingle: "+ メンバーを追加",
                lblScheduleTitle: "2. 試合スケジュール",
                btnGenerate: "🎲 レベル自動バランス対戦生成",
                noSchedule: "公開されたスケジュールはまだありません。",
                roundTxt: "ラウンド",
                courtTxt: "コート",
                restTxt: "💤 このラウンドの休憩:",
                lblBulkTitle: "メンバー一括追加",
                lblBulkDesc: "1行に1人ずつ入力。形式: 名前 - A, 名前 - B または 名前 - C",
                btnBulkCancel: "キャンセル",
                btnBulkConfirm: "確定",
                alertNotEnough: "準備完了の人数が足りません！",
                confirmReset: "すべてのメンバーとスケジュールを削除してもよろしいですか？",
                cloudError: "クラウド接続エラー！"
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('role') === 'admin') isAdmin = true;

        if (isAdmin) {
            document.querySelectorAll('.admin-only').forEach(el => {
                if(el.tagName === 'BUTTON') el.style.display = 'inline-flex';
                else el.style.display = 'block';
            });
        }

        const LEVEL_POINTS = { 'A': 3, 'B': 2, 'C': 1 };

        function toggleLanguage() {
            currentLang = currentLang === 'vi' ? 'ja' : 'vi';
            render();
        }

        function getLevelStyles(level, isPlaying) {
            if (!isPlaying) return 'bg-slate-200 text-slate-400 line-through border-transparent';
            if (level === 'A') return 'bg-rose-50 text-rose-700 border-rose-200';
            if (level === 'C') return 'bg-amber-50 text-amber-700 border-amber-200';
            return 'bg-blue-50 text-blue-700 border-blue-200';
        }

        function getLevelBadge(level) {
            if (level === 'A') return '<span class="text-[9px] bg-rose-600 text-white px-1 rounded-sm mr-1 font-bold">A</span>';
            if (level === 'C') return '<span class="text-[9px] bg-amber-500 text-white px-1 rounded-sm mr-1 font-bold">C</span>';
            return '<span class="text-[9px] bg-blue-600 text-white px-1 rounded-sm mr-1 font-bold">B</span>';
        }

        async function loadDataFromCloud() {
            if (!BIN_ID || BIN_ID.includes("CHÈN_")) {
                document.getElementById('scheduleContainer').innerHTML = `<div class="text-center text-xs text-rose-500 font-bold p-4">${i18n[currentLang].noConfigCloud}</div>`;
                return;
            }
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
                const resData = await res.json();
                let data = resData.record;
                members = data.members || [];
                totalRoundsSetting = data.totalRoundsSetting || 5;
                activeCourtsCount = data.activeCourtsCount || 1;
                generatedSchedule = data.generatedSchedule || [];
                render();
            } catch (err) { console.error(err); }
        }

        async function saveDataToCloud() {
            if (!isAdmin) return;
            try {
                document.getElementById('roleDisplay').innerText = i18n[currentLang].loadingCloud;
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                    body: JSON.stringify({ members, totalRoundsSetting, activeCourtsCount, generatedSchedule })
                });
                document.getElementById('roleDisplay').innerText = i18n[currentLang].saveCloudSuccess;
                render();
            } catch (err) { alert(i18n[currentLang].cloudError); }
        }

        function changeCourts(val) { if(!isAdmin) return; activeCourtsCount = Math.max(1, activeCourtsCount + val); render(); }
        function changeRoundsSetting(val) { if(!isAdmin) return; totalRoundsSetting = Math.max(1, totalRoundsSetting + val); render(); }
        
        function addMember() {
            if(!isAdmin) return;
            const name = document.getElementById('memberNameInput').value.trim();
            if (!name) return;
            const level = document.getElementById('memberLevelInput').value;
            members.push({ id: 'm_'+Date.now()+Math.random(), name, level, status: 'playing' });
            document.getElementById('memberNameInput').value = '';
            render();
        }
        function deleteMember(id) { if(!isAdmin) return; members = members.filter(m => m.id !== id); generatedSchedule = []; render(); }
        function toggleStatus(id) { if(!isAdmin) return; members = members.map(m => { if(m.id === id) m.status = m.status === 'playing' ? 'resting' : 'playing'; return m; }); generatedSchedule = []; render(); }

        function optimizeMatchUp(players) {
            let combinations = [
                { teamA: [players[0], players[1]], teamB: [players[2], players[3]] },
                { teamA: [players[0], players[2]], teamB: [players[1], players[3]] },
                { teamA: [players[0], players[3]], teamB: [players[1], players[2]] }
            ];
            let bestMatch = combinations[0];
            let minDiff = 999;
            combinations.forEach(combo => {
                let scoreA = LEVEL_POINTS[combo.teamA[0].level] + LEVEL_POINTS[combo.teamA[1].level];
                let scoreB = LEVEL_POINTS[combo.teamB[0].level] + LEVEL_POINTS[combo.teamB[1].level];
                let diff = Math.abs(scoreA - scoreB);
                if ((combo.teamA[0].level === 'C' && combo.teamA[1].level === 'C' && (combo.teamB[0].level === 'A' || combo.teamB[1].level === 'A')) ||
                    (combo.teamB[0].level === 'C' && combo.teamB[1].level === 'C' && (combo.teamA[0].level === 'A' || combo.teamA[1].level === 'A'))) {
                    diff += 2; 
                }
                if (diff < minDiff) { minDiff = diff; bestMatch = combo; }
            });
            return bestMatch;
        }

        function generateAllRounds() {
            if(!isAdmin) return;
            let availableMembers = members.filter(m => m.status === 'playing');
            let requiredPlayers = activeCourtsCount * 4;
            if (availableMembers.length < requiredPlayers) return alert(i18n[currentLang].alertNotEnough);

            let playedCounts = {}, consecutiveRest = {};
            availableMembers.forEach(m => { playedCounts[m.id] = 0; consecutiveRest[m.id] = 0; });

            let tempSchedule = [];
            for (let r = 1; r <= totalRoundsSetting; r++) {
                let mustPlayPool = [], normalPool = [];
                availableMembers.forEach(m => { if (consecutiveRest[m.id] >= 2) mustPlayPool.push(m); else normalPool.push(m); });
                normalPool.sort((a, b) => playedCounts[a.id] - playedCounts[b.id] || Math.random() - 0.5);
                let roundPlayers = [...mustPlayPool, ...normalPool.slice(0, requiredPlayers - mustPlayPool.length)];
                roundPlayers.sort(() => Math.random() - 0.5);
                
                let roundMatches = [];
                let playingIds = [];
                for (let i = 0; i < activeCourtsCount; i++) {
                    let idx = i * 4;
                    let courtFour = [roundPlayers[idx], roundPlayers[idx+1], roundPlayers[idx+2], roundPlayers[idx+3]];
                    let optimized = optimizeMatchUp(courtFour);
                    optimized.teamA.forEach(p => { playedCounts[p.id]++; playingIds.push(p.id); });
                    optimized.teamB.forEach(p => { playedCounts[p.id]++; playingIds.push(p.id); });
                    roundMatches.push({ courtNumber: i + 1, teamA: optimized.teamA, teamB: optimized.teamB });
                }
                let restingPeople = [];
                availableMembers.forEach(m => {
                    if (playingIds.includes(m.id)) consecutiveRest[m.id] = 0;
                    else { consecutiveRest[m.id]++; restingPeople.push(m); }
                });
                tempSchedule.push({ roundNumber: r, matches: roundMatches, resting: restingPeople });
            }
            generatedSchedule = tempSchedule;
            render();
        }

        function openBulkModal() { document.getElementById('bulkInput').value = ''; document.getElementById('bulkModal').classList.remove('hidden'); }
        function closeBulkModal() { document.getElementById('bulkModal').classList.add('hidden'); }
        
        function submitBulkMembers() {
            const text = document.getElementById('bulkInput').value;
            text.split('\n').forEach(line => {
                let raw = line.trim(); if(!raw) return;
                let name = raw, level = 'B';
                if (raw.includes('-')) {
                    let parts = raw.split('-'); name = parts[0].trim();
                    let parsedLevel = parts[1].trim().toUpperCase();
                    if (['A', 'B', 'C'].includes(parsedLevel)) level = parsedLevel;
                }
                if(name) members.push({ id: 'm_'+Date.now()+Math.random(), name, level, status: 'playing' });
            });
            generatedSchedule = []; closeBulkModal(); render();
        }

        function resetData() { if(confirm(i18n[currentLang].confirmReset)) { members = []; generatedSchedule = []; render(); } }

        // HÀM VẼ GIAO DIỆN TÍCH HỢP ĐA NGÔN NGỮ
        function render() {
            const t = i18n[currentLang];
            
            // Dịch giao diện tĩnh
            document.getElementById('langBtn').innerText = t.langBtn;
            document.getElementById('mainTitle').innerText = t.mainTitle;
            document.getElementById('roleDisplay').innerText = isAdmin ? t.roleAdmin : t.roleUser;
            document.getElementById('adminPanelTitle').innerText = t.adminPanelTitle;
            document.getElementById('btnLoadCloud').innerText = t.btnLoadCloud;
            document.getElementById('btnSaveCloud').innerText = t.btnSaveCloud;
            document.getElementById('lblCourts').innerText = t.lblCourts;
            document.getElementById('lblRounds').innerText = t.lblRounds;
            document.getElementById('lblMemberList').innerText = t.lblMemberList;
            document.getElementById('btnBulkAdd').innerText = t.btnBulkAdd;
            document.getElementById('btnReset').innerText = t.btnReset;
            document.getElementById('memberNameInput').placeholder = t.placeholderName;
            document.getElementById('btnAddSingle').innerText = t.btnAddSingle;
            document.getElementById('lblScheduleTitle').innerText = t.lblScheduleTitle;
            document.getElementById('btnGenerate').innerText = t.btnGenerate;
            document.getElementById('lblBulkTitle').innerText = t.lblBulkTitle;
            document.getElementById('lblBulkDesc').innerText = t.lblBulkDesc;
            document.getElementById('btnBulkCancel').innerText = t.btnBulkCancel;
            document.getElementById('btnBulkConfirm').innerText = t.btnBulkConfirm;

            document.getElementById('courtCountDisplay').innerText = activeCourtsCount;
            document.getElementById('roundsSettingDisplay').innerText = totalRoundsSetting;

            // Dịch danh sách thành viên
            const memberListDiv = document.getElementById('memberList');
            memberListDiv.innerHTML = '';
            members.forEach(m => {
                const isPlaying = m.status === 'playing';
                const colors = getLevelStyles(m.level, isPlaying);
                memberListDiv.innerHTML += `
                    <div class="flex items-center border rounded-xl px-2 py-1 text-xs font-semibold ${colors}">
                        <span ${isAdmin ? `onclick="toggleStatus('${m.id}')"` : ''} class="${isAdmin ? 'cursor-pointer select-none' : ''}">
                            ${isPlaying ? '🟢 ' : '⚫ '}${isPlaying ? getLevelBadge(m.level) : ''}${m.name}
                        </span>
                        ${isAdmin ? `<button onclick="deleteMember('${m.id}')" class="text-slate-400 hover:text-red-500 font-bold ml-1 text-sm cursor-pointer">×</button>` : ''}
                    </div>
                `;
            });

            // Dịch lịch thi đấu công khai
            const scheduleContainer = document.getElementById('scheduleContainer');
            scheduleContainer.innerHTML = '';
            if (generatedSchedule.length === 0) {
                scheduleContainer.innerHTML = `<div class="text-center py-8 text-xs text-slate-400">${t.noSchedule}</div>`;
                return;
            }

            generatedSchedule.forEach(round => {
                let roundHtml = `
                    <div class="border border-slate-200 rounded-2xl p-4 bg-white shadow-xs space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-extrabold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full uppercase tracking-wider">🔥 ${t.roundTxt} ${round.roundNumber}</span>
                        </div>
                        <div class="grid grid-cols-1 gap-3">`;
                
                round.matches.forEach(match => {
                    roundHtml += `
                        <div class="bg-slate-50 border border-slate-100 rounded-xl p-3 flex flex-col items-center relative space-y-2">
                            <div class="w-full text-[10px] font-bold text-slate-400 uppercase text-left">🏸 ${t.courtTxt} ${match.courtNumber}</div>
                            <div class="w-full grid grid-cols-7 items-center text-center text-xs font-semibold">
                                <div class="col-span-3 bg-white p-2 rounded-xl border border-slate-100 shadow-2xs text-left px-3 space-y-1">
                                    <div class="truncate text-slate-700 flex items-center">${getLevelBadge(match.teamA[0].level)}${match.teamA[0].name}</div>
                                    <div class="truncate text-slate-700 flex items-center">${getLevelBadge(match.teamA[1].level)}${match.teamA[1].name}</div>
                                </div>
                                <div class="col-span-1 text-slate-300 italic text-[11px]">vs</div>
                                <div class="col-span-3 bg-white p-2 rounded-xl border border-slate-100 shadow-2xs text-left px-3 space-y-1">
                                    <div class="truncate text-slate-700 flex items-center">${getLevelBadge(match.teamB[0].level)}${match.teamB[0].name}</div>
                                    <div class="truncate text-slate-700 flex items-center">${getLevelBadge(match.teamB[1].level)}${match.teamB[1].name}</div>
                                </div>
                            </div>
                        </div>`;
                });

                if (round.resting && round.resting.length > 0) {
                    roundHtml += `<div class="text-[10px] text-slate-400 bg-slate-50 p-2 rounded-xl">${t.restTxt} ${round.resting.map(m => `${getLevelBadge(m.level)}${m.name}`).join(', ')}</div>`;
                }
                roundHtml += `</div></div>`;
                scheduleContainer.innerHTML += roundHtml;
            });
        }

        loadDataFromCloud();
    </script>
</body>
</html>
