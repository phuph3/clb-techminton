<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sân Cầu Lông - Lịch Thi Đấu CLB</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .admin-only { display: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen p-4 pb-12">

    <div class="max-w-xl mx-auto space-y-6">
        <header class="text-center py-4 bg-gradient-to-r from-indigo-600 to-blue-600 text-white rounded-2xl shadow-md">
            <h1 class="text-xl font-bold uppercase tracking-wide">Lịch Thi Đấu Cầu Lông</h1>
            <p id="roleDisplay" class="text-xs opacity-90 mt-1">Chế độ: Đang tải dữ liệu...</p>
        </header>

        <section class="admin-only bg-amber-50 border border-amber-200 p-4 rounded-2xl shadow-sm space-y-2">
            <h3 class="font-bold text-xs text-amber-800 uppercase">Bảng điều khiển Admin</h3>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="loadDataFromCloud()" class="bg-white hover:bg-slate-50 text-slate-700 font-medium py-2 rounded-xl text-xs border border-slate-200 cursor-pointer">🔄 Tải data từ Cloud</button>
                <button onclick="saveDataToCloud()" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 rounded-xl text-xs cursor-pointer">☁️ Lưu & Phát sóng lịch</button>
            </div>
        </section>

        <section class="bg-white p-4 rounded-2xl shadow-sm grid grid-cols-2 gap-4">
            <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                <div>
                    <h3 class="font-bold text-xs text-slate-700 uppercase">Số sân đấu</h3>
                </div>
                <div class="flex items-center gap-1.5 p-1">
                    <button onclick="changeCourts(-1)" class="admin-only w-6 h-6 font-bold text-slate-700 bg-white rounded border border-slate-200 cursor-pointer justify-center items-center text-xs">-</button>
                    <span id="courtCountDisplay" class="w-6 text-center font-bold text-indigo-600 text-sm">1</span>
                    <button onclick="changeCourts(1)" class="admin-only w-6 h-6 font-bold text-slate-700 bg-white rounded border border-slate-200 cursor-pointer justify-center items-center text-xs">+</button>
                </div>
            </div>

            <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                <div>
                    <h3 class="font-bold text-xs text-slate-700 uppercase">Tổng số vòng</h3>
                </div>
                <div class="flex items-center gap-1.5 p-1">
                    <button onclick="changeRoundsSetting(-1)" class="admin-only w-6 h-6 font-bold text-slate-700 bg-white rounded border border-slate-200 cursor-pointer justify-center items-center text-xs">-</button>
                    <span id="roundsSettingDisplay" class="w-6 text-center font-bold text-indigo-600 text-sm">5</span>
                    <button onclick="changeRoundsSetting(1)" class="admin-only w-6 h-6 font-bold text-slate-700 bg-white rounded border border-slate-200 cursor-pointer justify-center items-center text-xs">+</button>
                </div>
            </div>
        </section>

        <section class="bg-white p-4 rounded-2xl shadow-sm space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-sm text-slate-500 uppercase tracking-wider">1. Danh sách Thành Viên</h2>
                <div class="admin-only gap-2 flex">
                    <button onclick="openBulkModal()" class="text-xs text-indigo-600 font-bold bg-indigo-50 px-2 py-1 rounded-lg border border-indigo-100 cursor-pointer">📝 Thêm hàng loạt</button>
                    <button onclick="resetData()" class="text-xs text-red-500 font-medium cursor-pointer">Xóa hết</button>
                </div>
            </div>
            <div class="admin-only grid grid-cols-3 gap-2">
                <input id="memberNameInput" type="text" placeholder="Tên thành viên..." class="col-span-2 px-3 py-2 border border-slate-200 rounded-xl text-sm">
                <select id="memberLevelInput" class="px-2 py-2 border border-slate-200 rounded-xl bg-white text-sm font-bold text-slate-700">
                    <option value="A">⚠️ Level A (Mạnh)</option>
                    <option value="B" selected>🔹 Level B (Vừa)</option>
                    <option value="C">🔸 Level C (Yếu)</option>
                </select>
            </div>
            <button onclick="addMember()" class="admin-only w-full bg-indigo-600 text-white font-medium py-2 rounded-xl text-sm cursor-pointer justify-center items-center">+ Thêm Thành Viên</button>
            <div id="memberList" class="flex flex-wrap gap-2 pt-2"></div>
        </section>

        <section class="bg-white p-4 rounded-2xl shadow-sm space-y-4">
            <div class="border-b border-slate-100 pb-2">
                <h2 class="font-bold text-sm text-slate-500 uppercase tracking-wider">2. Lịch Trình Các Vòng Đấu</h2>
            </div>

            <button onclick="generateAllRounds()" class="admin-only w-full bg-gradient-to-r from-indigo-600 to-blue-500 text-white font-bold py-3 rounded-xl shadow-md cursor-pointer justify-center items-center">
                🎲 Tự Động Xếp Toàn Bộ Vòng Đấu
            </button>

            <div id="scheduleContainer" class="space-y-4"></div>
        </section>
    </div>

    <div id="bulkModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-md p-5 space-y-4 shadow-xl">
            <div>
                <h3 class="font-bold text-base text-slate-800">Thêm hàng loạt</h3>
                <p class="text-xs text-slate-400 mt-0.5">Nhập tên bình thường (mặc định Level B). Muốn gán level luôn thì gõ dạng: <span class="font-mono bg-slate-100 px-1 rounded text-red-500">Tên - A</span> hoặc <span class="font-mono bg-slate-100 px-1 rounded text-amber-500">Tên - C</span></p>
            </div>
            <textarea id="bulkInput" rows="8" placeholder="Nguyễn Văn A - A&#10;Trần Thị B - B&#10;Lê Văn C - C" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-mono focus:outline-indigo-500"></textarea>
            <div class="flex justify-end gap-2 text-sm font-medium">
                <button onclick="closeBulkModal()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl cursor-pointer">Hủy</button>
                <button onclick="submitBulkMembers()" class="px-4 py-2 bg-indigo-600 text-white rounded-xl cursor-pointer">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
        // ĐIỀN THÔNG TIN KẾT NỐI JSONBIN CỦA BẠN VÀO ĐÂY
        const BIN_ID = "6a23e2ecda38895dfe903b0f"; 
        const MASTER_KEY = "$2a$10$yOZaOHQ26goa2W1RaXmo3OBw7rZy.Td1wg6qA1DYyRx.jRfvkpoWi"; 

        let members = [];
        let totalRoundsSetting = 5;
        let activeCourtsCount = 1;
        let generatedSchedule = [];
        let isAdmin = false;

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('role') === 'admin') {
            isAdmin = true;
        }

        if (isAdmin) {
            document.querySelectorAll('.admin-only').forEach(el => {
                if(el.tagName === 'BUTTON') el.style.display = 'inline-flex';
                else el.style.display = 'block';
            });
            document.getElementById('roleDisplay').innerText = "🔑 Chế độ: Quản trị viên (Admin)";
        } else {
            document.getElementById('roleDisplay').innerText = "📱 Chế độ: Thành viên (Chỉ xem lịch)";
        }

        // Bản màu sắc riêng cho từng Level
        function getLevelStyles(level, isPlaying) {
            if (!isPlaying) return 'bg-slate-200 text-slate-400 line-through border-transparent';
            
            switch(level) {
                case 'A': // Đỏ/Hồng đậm cho siêu sao
                    return 'bg-rose-50 text-rose-700 border-rose-200';
                case 'C': // Cam/Hổ phách cho người mới tập
                    return 'bg-amber-50 text-amber-700 border-amber-200';
                case 'B':
                default: // Xanh dương trung cấp tiêu chuẩn
                    return 'bg-blue-50 text-blue-700 border-blue-200';
            }
        }

        function getLevelBadge(level) {
            switch(level) {
                case 'A': return '<span class="text-[9px] bg-rose-600 text-white px-1 rounded-sm mr-1 font-bold">A</span>';
                case 'C': return '<span class="text-[9px] bg-amber-500 text-white px-1 rounded-sm mr-1 font-bold">C</span>';
                case 'B':
                default: return '<span class="text-[9px] bg-blue-600 text-white px-1 rounded-sm mr-1 font-bold">B</span>';
            }
        }

        async function loadDataFromCloud() {
            if (!BIN_ID || BIN_ID.includes("CHÈN_")) {
                document.getElementById('scheduleContainer').innerHTML = `<div class="text-center text-xs text-rose-500 font-bold p-4">Vui lòng mở file code điền BIN_ID và MASTER_KEY để kết nối dữ liệu!</div>`;
                return;
            }
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { "X-Master-Key": MASTER_KEY }
                });
                const resData = await res.json();
                let data = resData.record;
                members = data.members || [];
                totalRoundsSetting = data.totalRoundsSetting || 5;
                activeCourtsCount = data.activeCourtsCount || 1;
                generatedSchedule = data.generatedSchedule || [];
                render();
            } catch (err) {
                console.error("Lỗi tải data:", err);
            }
        }

        async function saveDataToCloud() {
            if (!isAdmin) return;
            try {
                document.getElementById('roleDisplay').innerText = "⏳ Đang đồng bộ lên đám mây...";
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": MASTER_KEY
                    },
                    body: JSON.stringify({ members, totalRoundsSetting, activeCourtsCount, generatedSchedule })
                });
                document.getElementById('roleDisplay').innerText = "🔑 Đã phát sóng lịch mới thành công!";
                render();
            } catch (err) {
                alert("Lỗi kết nối đám mây!");
            }
        }

        function changeCourts(val) {
            if(!isAdmin) return;
            activeCourtsCount = Math.max(1, activeCourtsCount + val);
            render();
        }
        function changeRoundsSetting(val) {
            if(!isAdmin) return;
            totalRoundsSetting = Math.max(1, totalRoundsSetting + val);
            render();
        }
        function addMember() {
            if(!isAdmin) return;
            const name = document.getElementById('memberNameInput').value.trim();
            if (!name) return;
            const level = document.getElementById('memberLevelInput').value;
            members.push({ id: 'm_'+Date.now()+Math.random(), name, level, status: 'playing' });
            document.getElementById('memberNameInput').value = '';
            render();
        }
        function deleteMember(id) {
            if(!isAdmin) return;
            members = members.filter(m => m.id !== id);
            generatedSchedule = [];
            render();
        }
        function toggleStatus(id) {
            if(!isAdmin) return;
            members = members.map(m => { if(m.id === id) m.status = m.status === 'playing' ? 'resting' : 'playing'; return m; });
            generatedSchedule = [];
            render();
        }

        function generateAllRounds() {
            if(!isAdmin) return;
            let availableMembers = members.filter(m => m.status === 'playing');
            let requiredPlayers = activeCourtsCount * 4;
            if (availableMembers.length < requiredPlayers) return alert("Không đủ người sẵn sàng!");

            let playedCounts = {}, consecutiveRest = {};
            availableMembers.forEach(m => { playedCounts[m.id] = 0; consecutiveRest[m.id] = 0; });

            let tempSchedule = [];
            for (let r = 1; r <= totalRoundsSetting; r++) {
                let mustPlayPool = [], normalPool = [];
                availableMembers.forEach(m => { if (consecutiveRest[m.id] >= 2) mustPlayPool.push(m); else normalPool.push(m); });
                normalPool.sort((a, b) => playedCounts[a.id] - playedCounts[b.id] || Math.random() - 0.5);
                let pool = [...mustPlayPool, ...normalPool.slice(0, requiredPlayers - mustPlayPool.length)];
                
                let bestArrangement = [...pool].sort(() => Math.random() - 0.5);
                let roundMatches = [];
                let playingIds = [];

                for (let i = 0; i < activeCourtsCount; i++) {
                    let idx = i * 4;
                    let p1 = bestArrangement[idx], p2 = bestArrangement[idx+1], p3 = bestArrangement[idx+2], p4 = bestArrangement[idx+3];
                    playedCounts[p1.id]++; playedCounts[p2.id]++; playedCounts[p3.id]++; playedCounts[p4.id]++;
                    playingIds.push(p1.id, p2.id, p3.id, p4.id);

                    roundMatches.push({ 
                        courtNumber: i + 1, 
                        teamA: [p1, p2], 
                        teamB: [p3, p4]
                    });
                }

                let restingPeople = [];
                availableMembers.forEach(m => {
                    if (playingIds.includes(m.id)) consecutiveRest[m.id] = 0;
                    else { consecutiveRest[m.id]++; restingPeople.push(m); }
                });
                tempSchedule.push({ roundNumber: r, matches: roundMatches, resting: restingPeople });
            }
            generatedSchedule = tempSchedule;
            render();
        }

        function openBulkModal() { 
            document.getElementById('bulkInput').value = '';
            document.getElementById('bulkModal').classList.remove('hidden'); 
        }
        function closeBulkModal() { 
            document.getElementById('bulkModal').classList.add('hidden'); 
        }
        
        function submitBulkMembers() {
            const text = document.getElementById('bulkInput').value;
            text.split('\n').forEach(line => {
                let raw = line.trim(); 
                if(!raw) return;
                
                let name = raw;
                let level = 'B'; // mặc định nếu không điền gì
                
                if (raw.includes('-')) {
                    let parts = raw.split('-');
                    name = parts[0].trim();
                    let parsedLevel = parts[1].trim().toUpperCase();
                    if (['A', 'B', 'C'].includes(parsedLevel)) {
                        level = parsedLevel;
                    }
                }
                
                if(name) {
                    members.push({ id: 'm_'+Date.now()+Math.random(), name, level, status: 'playing' });
                }
            });
            generatedSchedule = [];
            closeBulkModal();
            render();
        }

        function resetData() { 
            if(confirm("Bạn có chắc chắn muốn xóa hết toàn bộ thành viên và lịch đấu không?")) { 
                members = []; 
                generatedSchedule = []; 
                render(); 
            } 
        }

        function render() {
            document.getElementById('courtCountDisplay').innerText = activeCourtsCount;
            document.getElementById('roundsSettingDisplay').innerText = totalRoundsSetting;

            const memberListDiv = document.getElementById('memberList');
            memberListDiv.innerHTML = '';
            members.forEach(m => {
                const isPlaying = m.status === 'playing';
                const colors = getLevelStyles(m.level, isPlaying);
                memberListDiv.innerHTML += `
                    <div class="flex items-center border rounded-xl px-2 py-1 text-xs font-semibold ${colors}">
                        <span ${isAdmin ? `onclick="toggleStatus('${m.id}')"` : ''} class="${isAdmin ? 'cursor-pointer select-none' : ''}">
                            ${isPlaying ? '🟢 ' : '⚫ '} ${isPlaying ? getLevelBadge(m.level) : ''}${m.name}
                        </span>
                        ${isAdmin ? `<button onclick="deleteMember('${m.id}')" class="text-slate-400 hover:text-red-500 font-bold ml-1 text-sm cursor-pointer">×</button>` : ''}
                    </div>
                `;
            });

            const scheduleContainer = document.getElementById('scheduleContainer');
            scheduleContainer.innerHTML = '';
            if (generatedSchedule.length === 0) {
                scheduleContainer.innerHTML = `<div class="text-center py-8 text-xs text-slate-400">Chưa có lịch đấu được phát sóng công khai.</div>`;
                return;
            }

            generatedSchedule.forEach(round => {
                let roundHtml = `
                    <div class="border border-slate-200 rounded-2xl p-4 bg-white shadow-xs space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-extrabold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full uppercase tracking-wider">🔥 VÒNG ĐẤU SỐ ${round.roundNumber}</span>
                        </div>
                        <div class="grid grid-cols-1 gap-3">`;
                
                round.matches.forEach(match => {
                    roundHtml += `
                        <div class="bg-slate-50 border border-slate-100 rounded-xl p-3 flex flex-col items-center relative space-y-2">
                            <div class="w-full text-[10px] font-bold text-slate-400 uppercase text-left">🏸 Sân số ${match.courtNumber}</div>
                            
                            <div class="w-full grid grid-cols-7 items-center text-center text-xs font-semibold">
                                <div class="col-span-3 bg-white p-2 rounded-xl border border-slate-100 shadow-2xs text-left px-3 space-y-1">
                                    <div class="truncate text-slate-700 flex items-center">${getLevelBadge(match.teamA[0].level)}${match.teamA[0].name}</div>
                                    <div class="truncate text-slate-700 flex items-center">${getLevelBadge(match.teamA[1].level)}${match.teamA[1].name}</div>
                                </div>
                                <div class="col-span-1 text-slate-300 italic text-[11px]">vs</div>
                                <div class="col-span-3 bg-white p-2 rounded-xl border border-slate-100 shadow-2xs text-left px-3 space-y-1">
                                    <div class="truncate text-slate-700 flex items-center">${getLevelBadge(match.teamB[0].level)}${match.teamB[0].name}</div>
                                    <div class="truncate text-slate-700 flex items-center">${getLevelBadge(match.teamB[1].level)}${match.teamB[1].name}</div>
                                </div>
                            </div>
                        </div>`;
                });

                if (round.resting && round.resting.length > 0) {
                    roundHtml += `<div class="text-[10px] text-slate-400 bg-slate-50 p-2 rounded-xl">💤 Nghỉ vòng này: ${round.resting.map(m => `${getLevelBadge(m.level)}${m.name}`).join(', ')}</div>`;
                }
                roundHtml += `</div></div>`;
                scheduleContainer.innerHTML += roundHtml;
            });
        }

        loadDataFromCloud();
    </script>
</body>
</html>
